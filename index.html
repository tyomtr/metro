<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>銀座線発車メロディー リスニングテスト</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 40px;
    }
    .hidden { display: none; }
    button {
      font-size: 20px;
      padding: 12px 24px;
      margin: 10px;
    }
    .answer {
      font-size: 30px;
      margin: 20px;
      font-weight: bold;
    }

    .answer small {
     font-size: 25px;
      color: #666;
    }

  </style>
</head>
<body>

  <!-- 設定画面 -->
  <div id="setup">
    <h1>銀座線 発車メロディー リスニングテスト</h1>
    <p>出題数を選択</p>
    <button onclick="startGame(5)">5問</button>
    <button onclick="startGame(10)">10問</button>
    <button onclick="startGame(999)">すべて</button>
  </div>

  <!-- 出題画面 -->
  <div id="quiz" class="hidden">
    <h2 id="progress"></h2>
    <button onclick="playAudio()">▶ 再生</button>
    <div id="answer" class="answer hidden"></div>
    <button id="nextBtn" class="hidden" onclick="nextQuestion()">次へ</button>
    <button id="endBtn" onclick="endGame()">終了</button>
  </div>

  <!-- 結果画面 -->
  <div id="result" class="hidden">
    <h2>おつかれさま！</h2>
    <button onclick="location.reload()">もう一度</button>
  </div>

<script>
  // ===== データ（ここを編集）=====
  const data = [
    { audio: "audio/00 - 101.mp3", title: "道はここから", station: "G-01 渋谷 1番線" },
    { audio: "audio/00 - 102.mp3", title: "アンディーン", station: "G-01 渋谷 2番線" },
    { audio: "audio/00 - 103.mp3", title: "永遠に続く道", station: "G-02 表参道 A線" },
    { audio: "audio/00 - 104.mp3", title: "早瀬", station: "G-02 表参道 B線" },
    { audio: "audio/00 - 105.mp3", title: "ようこそ！", station: "G-03 外苑前 A線" },
    { audio: "audio/00 - 106.mp3", title: "Ready To Go", station: "G-03 外苑前 B線" },
    { audio: "audio/00 - 107.mp3", title: "いつかきっと", station: "G-04 青山一丁目 A線" },
    { audio: "audio/00 - 108.mp3", title: "コンシェルジュ", station: "G-04 青山一丁目B 線" },
    { audio: "audio/00 - 109.mp3", title: "星を探して", station: "G-05 赤坂見附 A線" },
    { audio: "audio/00 - 110.mp3", title: "オレンジピール", station: "G-05 赤坂見附 B線" },
    { audio: "audio/00 - 111.mp3", title: "オリジナル曲", station: "G-06 溜池山王 A線" },
    { audio: "audio/00 - 112.mp3", title: "オリジナル曲", station: "G-06 溜池山王 B線" },
    { audio: "audio/00 - 113.mp3", title: "シトラスの香り", station: "G-07 虎ノ門 A線" },
    { audio: "audio/00 - 114.mp3", title: "玉紫陽花", station: "G-07 虎ノ門 B線" },
    { audio: "audio/00 - 115.mp3", title: "スタートライン", station: "G-08 新橋 A線" },
    { audio: "audio/00 - 116.mp3", title: "Fast River", station: "G-08 新橋 B線" },
    { audio: "audio/00 - 117.mp3", title: "銀座カンカン娘", station: "G-09 銀座 A線" },
    { audio: "audio/00 - 118.mp3", title: "銀座カンカン娘", station: "G-09 銀座 B線" },
    { audio: "audio/00 - 119.mp3", title: "蜜柑色の夢", station: "G-10 京橋 A線" },
    { audio: "audio/00 - 120.mp3", title: "雪月花", station: "G-10 京橋 B線" },
    { audio: "audio/00 - 121.mp3", title: "お江戸日本橋", station: "G-11 日本橋 A線" },
    { audio: "audio/00 - 122.mp3", title: "お江戸日本橋", station: "G-11 日本橋 B線" },
    { audio: "audio/00 - 123.mp3", title: "お江戸日本橋", station: "G-12 三越前 A線" },
    { audio: "audio/00 - 124.mp3", title: "お江戸日本橋", station: "G-12 三越前 B線" },
    { audio: "audio/00 - 125.mp3", title: "お祭りマンボ", station: "G-13 神田 A線" },
    { audio: "audio/00 - 126.mp3", title: "お祭りマンボ", station: "G-13 神田 B線" },
    { audio: "audio/00 - 127.mp3", title: "オリジナル曲", station: "G-14 末広町 A線" },
    { audio: "audio/00 - 128.mp3", title: "オリジナル曲", station: "G-14 末広町 B線" },
    { audio: "audio/00 - 129.mp3", title: "オリジナル曲", station: "G-15 上野広小路 A線" },
    { audio: "audio/00 - 130.mp3", title: "オリジナル曲", station: "G-15 上野広小路 B線" },
    { audio: "audio/00 - 131.mp3", title: "さくら（独唱）", station: "G-16 上野 A線" },
    { audio: "audio/00 - 132.mp3", title: "さくら（独唱）", station: "G-16 上野 B線" },
    { audio: "audio/00 - 133.mp3", title: "オリジナル曲", station: "G-17 稲荷町 A線" },
    { audio: "audio/00 - 134.mp3", title: "オリジナル曲", station: "G-17 稲荷町 B線" },
    { audio: "audio/00 - 135.mp3", title: "オリジナル曲", station: "G-18 田原町 A線" },
    { audio: "audio/00 - 136.mp3", title: "オリジナル曲", station: "G-18 田原町 B線" },
    { audio: "audio/00 - 137.mp3", title: "花", station: "G-19 浅草 1番線" },
    { audio: "audio/00 - 138.mp3", title: "花", station: "G-19 浅草 2番線" },
    { audio: "audio/00 - 139.mp3", title: "水の都", station: "A線乗降促進" },
    { audio: "audio/00 - 140.mp3", title: "小鳥のワルツ", station: "B線乗降促進" }
  ];

  let questions = [];
  let current = 0;
  let audio = new Audio();

  function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

  function startGame(count) {
    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    const shuffled = shuffle([...data]);
    questions = shuffled.slice(0, Math.min(count, data.length));
    current = 0;

    loadQuestion();
  }

  function loadQuestion() {
    document.getElementById("answer").classList.add("hidden");
    document.getElementById("nextBtn").classList.add("hidden");

    document.getElementById("progress").textContent =
      `問題 ${current + 1} / ${questions.length}`;

    audio.src = questions[current].audio;

    audio.onended = () => {
      const q = questions[current];

      document.getElementById("answer").innerHTML =
      `${q.title}<br><small>${q.station}</small>`;

      document.getElementById("answer").classList.remove("hidden");
      document.getElementById("nextBtn").classList.remove("hidden");
    };

    const endBtn = document.getElementById("endBtn");
    if (current === questions.length - 1) {
    endBtn.classList.add("hidden");   // 最終問題 → 非表示
    } else {
    endBtn.classList.remove("hidden"); // それ以外 → 表示
    }  

    audio.play();
  }

  function playAudio() {
    audio.play();
  }

  function nextQuestion() {
    current++;

    if (current >= questions.length) {
      document.getElementById("quiz").classList.add("hidden");
      document.getElementById("result").classList.remove("hidden");
      return;
    }

    loadQuestion();
  }

  function endGame() {
    if (!confirm("途中で終了しますか？")) return;

    // 再生中の音声を止める
    audio.pause();
    audio.currentTime = 0;

    // 画面切り替え
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
}
</script>

</body>
</html>
