  let questions = [];
  let current = 0;
  let audio = new Audio();

  function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

  function startGame(count) {
    document.getElementById("setup").classList.add("hidden");
    document.getElementById("quiz").classList.remove("hidden");

    const shuffled = shuffle([...data]);
    questions = shuffled.slice(0, Math.min(count, data.length));
    current = 0;

    loadQuestion();
  }

  function loadQuestion() {
    document.getElementById("answer").classList.add("hidden");
    document.getElementById("nextBtn").classList.add("hidden");

    document.getElementById("progress").textContent =
      `問題 ${current + 1} / ${questions.length}`;

    audio.src = questions[current].audio;

    audio.onended = () => {
      const q = questions[current];

      document.getElementById("answer").innerHTML =
      `${q.title}<br><small>${q.station}</small>`;

      document.getElementById("answer").classList.remove("hidden");
      document.getElementById("nextBtn").classList.remove("hidden");
    };

    const endBtn = document.getElementById("endBtn");
    if (current === questions.length - 1) {
    endBtn.classList.add("hidden");   // 最終問題 → 非表示
    } else {
    endBtn.classList.remove("hidden"); // それ以外 → 表示
    }  

    audio.play();
  }

  function playAudio() {
    audio.play();
  }

  function nextQuestion() {
    current++;

    if (current >= questions.length) {
      document.getElementById("quiz").classList.add("hidden");
      document.getElementById("result").classList.remove("hidden");
      return;
    }

    loadQuestion();
  }

  function endGame() {
    if (!confirm("途中で終了しますか？")) return;

    // 再生中の音声を止める
    audio.pause();
    audio.currentTime = 0;

    // 画面切り替え
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
}
